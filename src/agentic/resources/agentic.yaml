# This file is the user-editable architecture agreement inside the local
# agentic/ communication boundary. Humans and LLMs should both treat it as
# durable project state, not temporary prompt context.
#
# The checker evaluates these rules against a normalized architecture map keyed
# by repo-relative file path. Each entry contains imports, classes, and
# functions.

language: python
exclusions: [.venv/**, agentic/**, tests/**]

rules:
  tags:
    - { name: feature, match: &feature src/agentic/features/* }
    - { name: module, match: &module src/agentic/features/*/* }
    - { name: module_shim, match: &module_shim src/agentic/features/*/*/__init__.py }
    - { name: domain, match: &domain src/agentic/features/*/*/domain }
    - { name: infrastructure, match: &infrastructure src/agentic/features/*/*/infrastructure }
    - { name: application, match: &application src/agentic/features/*/*/application }
    - { name: ui, match: &ui src/agentic/features/*/*/ui }
  boundaries:
    - { source: src/agentic/cli.py, disallow: [*feature], allow: [&feature_cli src/agentic/features/*/cli.py] }
    - { source: *feature, disallow: [*feature], allow_same_match: true, allow: [*feature, *module_shim] }
    - { source: *module, disallow: [*module], allow_same_match: true, allow: [*module] }
    - { source: *domain, disallow: [*infrastructure, *application, *ui] }
    - { source: *infrastructure, disallow: [*domain, *application, *ui], allow: [&domain_shim src/agentic/features/*/*/domain/__init__.py] }
    - { source: *application, disallow: [*domain, *infrastructure, *ui], allow: [*domain_shim, &infrastructure_shim src/agentic/features/*/*/infrastructure/__init__.py, src/agentic/features/*/*/infrastructure/*.py, src/agentic/features/workspace_contract/rules/infrastructure/file_repository.py] }
    - { source: *ui, disallow: [*application, *infrastructure, *domain], allow: [&application_shim src/agentic/features/*/*/application/__init__.py, src/agentic/features/*/*/application/*.py] }
    - { source: src/agentic/features/*/*/application/services/*, disallow: [src/agentic/features/*/*/application/commands/*, src/agentic/features/*/*/application/queries/*] }
  flow: { layers: [ui, application, infrastructure, domain], module_tag: feature, analyzers: [backward-flow, no-cycles] }
