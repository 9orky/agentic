# This file is the user-editable architecture agreement inside the local
# agentic/ communication boundary. Humans and LLMs should both treat it as
# durable project state, not temporary prompt context.
#
# The checker evaluates these rules against a normalized architecture map keyed
# by repo-relative file path. Each entry contains imports, classes, and
# functions.

language: ""

exclusions:
  - tests/**
  - node_modules/**
  - dist/**
  - build/**
  - .venv/**
  - agentic/**

rules:
  boundaries:
    - source: src/domain
      disallow:
        - src/infra
        - src/ui
