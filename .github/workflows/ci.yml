name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Install package and packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Bootstrap agentic contract
        run: agentic

      - name: Run architecture self-check
        run: agentic architecture check --project-root "$GITHUB_WORKSPACE"

      - name: Validate extractor syntax
        run: |
          node --check src/agentic/resources/arch/extractors/typescript_extractor.js
          php -l src/agentic/resources/arch/extractors/php_extractor.php

      - name: Build distributions
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Smoke test installed wheel
        run: |
          python -m venv .pkg-smoke
          .pkg-smoke/bin/pip install dist/*.whl
          .pkg-smoke/bin/agentic --help
